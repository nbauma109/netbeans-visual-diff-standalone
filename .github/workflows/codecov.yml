name: Coverage

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test with coverage
        run: xvfb-run -a mvn --batch-mode --no-transfer-progress -Dgpg.skip=true clean verify

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
